<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascade Engine — Live Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #0e1116; --panel: #161b22; --panel-2: #1c232c; --border: #2a323d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --ok: #3fb950; --warn: #d29922; --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    h1 { font-size: 20px; margin: 0; font-weight: 600; }
    .sub { color: var(--muted); font-size: 13px; }
    .spacer { flex: 1; }
    input {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 10px; border-radius: 6px; font-size: 13px; width: 200px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 18px; min-height: 90px;
    }
    .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 14px; }
    .stat { font-size: 30px; font-weight: 650; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .row:last-child { border-bottom: none; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .bar { height: 7px; border-radius: 4px; background: var(--panel-2); overflow: hidden; margin-top: 6px; }
    .bar > div { height: 100%; background: var(--accent); }
    .muted { color: var(--muted); }
    .err { color: var(--bad); font-size: 13px; }
    .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    Plain React (no JSX/Babel) for maximum reliability: `h` is React.createElement.
    Polls /health and /v1/stats and renders system health, circuit-breaker state,
    per-engine reliability, and today's routing stats.
  -->
  <script>
    (function () {
      var h = React.createElement;
      var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback;

      var COLORS = {
        healthy: "var(--ok)", closed: "var(--ok)", ok: "var(--ok)",
        degraded: "var(--warn)", half_open: "var(--warn)",
        unavailable: "var(--bad)", open: "var(--bad)", unreachable: "var(--bad)"
      };
      function colorFor(s) { return COLORS[String(s).toLowerCase()] || "var(--muted)"; }
      function pct(x) { return (100 * (x || 0)).toFixed(1) + "%"; }

      function Badge(props) {
        var c = colorFor(props.value);
        return h("span", { className: "badge", style: { background: c + "22", color: c } }, String(props.value));
      }

      function HealthCard(props) {
        var health = props.health || {};
        var circuit = health.circuit;
        var coreState = typeof health.core === "string" ? health.core
          : (health.core && health.core.status) || "ok";
        return h("div", { className: "card" },
          h("h2", null, "System Health"),
          props.error ? h("div", { className: "err" }, props.error) : null,
          h("div", { className: "row" }, h("span", null, "Gateway"), h(Badge, { value: health.gateway || "?" })),
          h("div", { className: "row" }, h("span", null, "Core service"), h(Badge, { value: coreState || "?" })),
          h("div", { className: "row" }, h("span", null, "Circuit breaker"), h(Badge, { value: (circuit && circuit.state) || "n/a" })),
          h("div", { className: "row" }, h("span", null, "Cloud fallback"),
            h("span", { className: "muted" }, health.fallback_configured ? "configured" : "off"))
        );
      }

      function EnginesCard(props) {
        var engines = props.engines || {};
        var ids = Object.keys(engines);
        ids.sort(function (a, b) { return (engines[a].tier || 0) - (engines[b].tier || 0); });
        return h("div", { className: "card" },
          h("h2", null, "Engines — Reliability"),
          ids.length === 0 ? h("div", { className: "muted" }, "No engine data yet.") : null,
          ids.map(function (id) {
            var e = engines[id];
            var ema = e.reliability_ema != null ? e.reliability_ema : e.reliability;
            return h("div", { key: id, style: { padding: "8px 0", borderBottom: "1px solid var(--border)" } },
              h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
                h("span", null, id, " ", h("span", { className: "muted" }, "· T" + e.tier)),
                h(Badge, { value: e.status })),
              h("div", { className: "bar" }, h("div", { style: { width: pct(ema), background: colorFor(e.status) } })),
              h("div", { className: "kv muted" }, h("span", null, "reliability (EMA)"), h("span", null, pct(ema)))
            );
          })
        );
      }

      function Distribution(props) {
        var data = props.data || {};
        var entries = Object.keys(data).map(function (k) { return [k, data[k]]; });
        var total = entries.reduce(function (s, e) { return s + e[1]; }, 0) || 1;
        entries.sort(function (a, b) { return b[1] - a[1]; });
        return h("div", { className: "card" },
          h("h2", null, props.title),
          entries.length === 0 ? h("div", { className: "muted" }, "None.") : null,
          entries.map(function (e) {
            var k = e[0], v = e[1];
            return h("div", { key: k, style: { padding: "6px 0" } },
              h("div", { className: "kv" }, h("span", null, props.label ? props.label(k) : k), h("span", { className: "muted" }, v)),
              h("div", { className: "bar" }, h("div", { style: { width: pct(v / total) } }))
            );
          })
        );
      }

      function TodayCard(props) {
        var t = props.today || {};
        return h("div", { className: "card" },
          h("h2", null, "Today"),
          h("div", { className: "stat" }, t.total_events || 0),
          h("div", { className: "muted", style: { marginBottom: 12 } }, "requests"),
          h("div", { className: "row" }, h("span", null, "Success rate"), h("strong", null, pct(t.success_rate))),
          h("div", { className: "row" }, h("span", null, "Total cost"), h("strong", null, "$" + (t.total_cost_usd || 0).toFixed(4)))
        );
      }

      function App() {
        var k = useState(localStorage.getItem("cascade_key") || ""), key = k[0], setKey = k[1];
        var hs = useState(null), health = hs[0], setHealth = hs[1];
        var st = useState(null), stats = st[0], setStats = st[1];
        var er = useState(""), error = er[0], setError = er[1];
        var up = useState(null), updated = up[0], setUpdated = up[1];

        var refresh = useCallback(function () {
          fetch("/health").then(function (r) { return r.json(); }).then(function (hh) { if (hh) setHealth(hh); }).catch(function () {});
          if (key) {
            fetch("/v1/stats", { headers: { Authorization: "Bearer " + key } }).then(function (r) {
              if (r.status === 401 || r.status === 403) { setError("Invalid API key for /v1/stats"); return null; }
              return r.json();
            }).then(function (s) { if (s) { setStats(s); setError(""); } }).catch(function (e) { setError(String(e)); });
          } else {
            setError("Enter an API key to load routing stats.");
          }
          setUpdated(new Date());
        }, [key]);

        useEffect(function () {
          refresh();
          var id = setInterval(refresh, 4000);
          return function () { clearInterval(id); };
        }, [refresh]);

        var online = health && health.gateway === "ok";
        return h("div", { className: "wrap" },
          h("header", null,
            h("span", { className: "dot", style: { background: online ? "var(--ok)" : "var(--bad)" } }),
            h("div", null,
              h("h1", null, "Cascade Engine"),
              h("div", { className: "sub" }, "Live routing dashboard · auto-refresh 4s",
                updated ? " · updated " + updated.toLocaleTimeString() : "")),
            h("div", { className: "spacer" }),
            h("input", {
              type: "password", placeholder: "API key (Bearer)", value: key,
              onChange: function (e) { setKey(e.target.value); localStorage.setItem("cascade_key", e.target.value); }
            })
          ),
          h("div", { className: "grid" },
            h(HealthCard, { health: health, error: !stats ? error : "" }),
            h(TodayCard, { today: stats && stats.today }),
            h(EnginesCard, { engines: stats && stats.engines }),
            h(Distribution, {
              title: "Tier Distribution",
              data: stats && stats.today && stats.today.tier_distribution,
              label: function (k) { return k === "0" ? "cache" : "Tier " + k; }
            }),
            h(Distribution, {
              title: "Failure Modes",
              data: stats && stats.today && stats.today.failure_mode_distribution
            })
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    })();
  </script>
</body>
</html>
