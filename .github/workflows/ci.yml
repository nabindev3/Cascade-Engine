name: Cascade Engine CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r python_core/requirements.txt

    - name: Download Spacy model for Presidio
      run: |
        python -m spacy download en_core_web_lg

    - name: Run tests (Excluding heavy models)
      run: |
        pytest -m "not heavy"

  gateway:
    name: TypeScript gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript_api
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: typescript_api/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type-check
      run: npx tsc --noEmit

    - name: Run gateway tests
      run: npm test
